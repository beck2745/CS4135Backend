spring.h2.console.enabled=true
# File-backed H2 so tutor profiles and users survive a backend restart (dev).
spring.datasource.url=jdbc:h2:file:./data/tutorapp;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ── Resilience: request timeout (5 s) ────────────────────────────────────────
spring.mvc.async.request-timeout=5000

# ── Resilience: Actuator health endpoint ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
