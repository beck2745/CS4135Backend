name: ShareCraft Backend Production CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-backends:
    name: Build and Push Backend Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - discovery-service
          - config-service
          - identity-service
          - booking-service
          - messaging-service
          - tutor-service
          - admin-service
          - api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build service with Maven
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sharecraft-${{ matrix.service }}:latest