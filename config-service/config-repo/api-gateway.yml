server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:changeit-changeit-changeit-changeit-32b}

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowed-origin-patterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true

eureka:
  client:
    service-url:
      # Docker Compose must set EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
