server:
  port: 8085

spring:
  application:
    name: admin-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:h2:file:./data/admindb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
