server:
  port: 8085

spring:
  application:
    name: admin-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:RZCjEf050QldV92z}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: admin_svc
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

# When true, /api/admin/** requires X-Authenticated-Role: ADMIN (set by API gateway from JWT).
sharecraft:
  security:
    require-admin-role-header: false
