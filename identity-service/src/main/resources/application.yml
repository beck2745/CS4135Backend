spring:
  application:
    name: identity-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:RZCjEf050QldV92z}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: identity_svc
    show-sql: false

  server:
    port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:changeit-changeit-changeit-changeit-32b}

management:
  endpoints:
    web:
      exposure:
        include: health,info