# ShareCraft (SkillSwap) — production-style orchestration for a VPS.
# Build and push images via CI (see .github/workflows/production-release.yml), then on the server:
#   export DOCKER_ORG=yourdockerhubuser
#   export JWT_SECRET=$(openssl rand -base64 32)
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Only the API gateway is published to the host; other services communicate on the Compose network
# by DNS name (matches the lab deployment guide).

services:
  discovery-service:
    image: ${DOCKER_ORG}/sharecraft-discovery-service:latest
    restart: unless-stopped

  config-service:
    image: ${DOCKER_ORG}/sharecraft-config-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in environment}

  identity-service:
    image: ${DOCKER_ORG}/sharecraft-identity-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
      - config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/

  booking-service:
    image: ${DOCKER_ORG}/sharecraft-booking-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
      - config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/

  messaging-service:
    image: ${DOCKER_ORG}/sharecraft-messaging-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
      - config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/

  tutor-service:
    image: ${DOCKER_ORG}/sharecraft-tutor-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
      - config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/

  admin-service:
    image: ${DOCKER_ORG}/sharecraft-admin-service:latest
    restart: unless-stopped
    depends_on:
      - discovery-service
      - config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/

  frontend:
    image: ${DOCKER_ORG}/sharecraft-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  api-gateway:
    image: ${DOCKER_ORG}/sharecraft-api-gateway:latest
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - discovery-service
      - config-service
      - identity-service
      - booking-service
      - messaging-service
      - tutor-service
      - admin-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
